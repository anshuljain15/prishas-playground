<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Build-a-Face 🥔 · Prisha's Playground</title>
<meta name="description" content="Add silly eyes, hats and noses to make a funny face — a free toddler creativity game from Prisha's Playground.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function () { 'use strict';
  let t = localStorage.getItem('lp_theme');
  if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  if (t === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  #wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    gap: 14px; padding: 74px 12px 12px;
  }

  #hint {
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: bold; color: var(--ink);
    background: var(--surface-soft);
    padding: 6px 20px; border-radius: 999px;
  }

  #face {
    width: clamp(220px, 60vmin, 360px);
    height: clamp(220px, 60vmin, 360px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, hsl(38, 90%, 78%), hsl(32, 80%, 62%) 70%, hsl(28, 75%, 54%));
    box-shadow: inset -10px -14px 26px rgba(0,0,0,0.15), 0 8px 22px rgba(0,0,0,0.18);
    position: relative;
    touch-action: none;
  }

  .part {
    position: absolute;
    font-size: clamp(2.4rem, 9vmin, 3.6rem);
    line-height: 1;
    cursor: grab;
    user-select: none;
    transform: translate(-50%, -50%);
    animation: dropIn 0.3s ease;
  }
  @keyframes dropIn { from { transform: translate(-50%,-50%) scale(0) rotate(-20deg); } }

  #palette {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px; max-width: 96vw;
  }
  #palette button {
    font-size: clamp(1.8rem, 6vw, 2.4rem);
    width: clamp(52px, 13vw, 66px); height: clamp(52px, 13vw, 66px);
    border: 3px solid var(--surface-soft);
    border-radius: 16px;
    background: var(--surface);
    cursor: pointer; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  #palette button:active { transform: scale(0.9); }

  #clearBtn {
    font-size: clamp(1.4rem, 5vw, 1.9rem);
    padding: 8px 24px; border-radius: 999px;
    border: 4px solid hsl(200,80%,55%);
    background: var(--surface); color: var(--ink);
    font-weight: bold; cursor: pointer; touch-action: manipulation;
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="hint">🥔 Tap to add a silly face!</div>
  <div id="face"></div>
  <div id="palette"></div>
  <button id="clearBtn" type="button">🧽 Start over</button>
</div>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  const PARTS = [
    ['👀','Eyes',50,38],['👁️','Eye',50,38],['👃','Nose',50,54],
    ['👄','Mouth',50,70],['😛','Tongue',50,70],['👂','Ears',50,50],
    ['🎩','Hat',50,8],['👑','Crown',50,8],['👓','Glasses',50,40],
    ['🧢','Cap',50,10],['👺','Nose',50,54],['🥸','Disguise',50,48],
    ['⭐','Star',50,30],['🎀','Bow',50,12]
  ];

  LP.initPage({ showCounter: false });
  LP.speak('Make a silly face, ' + LP.playerName + '!');

  const face = document.getElementById('face');
  const palette = document.getElementById('palette');

  function addPart(emoji, word, xPct, yPct) {
    const p = document.createElement('span');
    p.className = 'part';
    p.textContent = emoji;
    // slight random offset so repeated taps stack playfully
    const x = Math.max(12, Math.min(88, xPct + LP.rand(-10, 10)));
    const y = Math.max(8, Math.min(90, yPct + LP.rand(-6, 6)));
    p.style.left = x + '%';
    p.style.top = y + '%';
    face.appendChild(p);
    enableDrag(p);
    LP.speak(word + '!');
  }

  // drag to reposition a placed part
  function enableDrag(p) {
    p.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      e.stopPropagation();
      const rect = face.getBoundingClientRect();
      p.setPointerCapture(e.pointerId);
      function moveTo(ev) {
        const x = ((ev.clientX - rect.left) / rect.width) * 100;
        const y = ((ev.clientY - rect.top) / rect.height) * 100;
        p.style.left = Math.max(4, Math.min(96, x)) + '%';
        p.style.top = Math.max(4, Math.min(96, y)) + '%';
      }
      function up() {
        p.removeEventListener('pointermove', moveTo);
        p.removeEventListener('pointerup', up);
      }
      p.addEventListener('pointermove', moveTo);
      p.addEventListener('pointerup', up);
    });
  }

  PARTS.forEach(function (part) {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = part[0];
    b.setAttribute('aria-label', part[1]);
    b.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      addPart(part[0], part[1], part[2], part[3]);
    });
    palette.appendChild(b);
  });

  document.getElementById('clearBtn').addEventListener('click', function () {
    Array.from(face.querySelectorAll('.part')).forEach(function (p) { p.remove(); });
    LP.speak('All clean! Start again!', true);
    this.blur();
  });
})();
</script>
</body>
</html>
