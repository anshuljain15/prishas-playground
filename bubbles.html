<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Peekaboo 🫧 · Prisha's Playground</title>
<meta name="description" content="Pop shimmering bubbles to reveal the surprise hiding inside — a free toddler game from Prisha's Playground.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function () { 'use strict';
  let t = localStorage.getItem('lp_theme');
  if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  if (t === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  body { --h: 190; --h2: 230; }

  #pond { position: fixed; inset: 0; overflow: hidden; }

  .bubble {
    position: fixed;
    width: clamp(90px, 18vmin, 150px);
    height: clamp(90px, 18vmin, 150px);
    cursor: pointer;
    animation: bubbleRise var(--dur) linear forwards;
    z-index: 10;
    will-change: transform;
  }

  @keyframes bubbleRise {
    from { transform: translateY(0); }
    to   { transform: translateY(calc(-100vh - 300px)); }
  }

  .bubble .film {
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 26%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.25) 18%, transparent 40%),
      radial-gradient(circle at 68% 72%, rgba(180,240,255,0.35), transparent 55%),
      radial-gradient(circle at 50% 50%, rgba(200,235,255,0.16), rgba(150,210,255,0.28));
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 0 24px rgba(255,255,255,0.35), 0 4px 18px rgba(80,140,220,0.25);
    display: flex; align-items: center; justify-content: center;
    animation: bubbleWobble var(--wob) ease-in-out infinite alternate;
  }

  @keyframes bubbleWobble {
    from { transform: translateX(-14px) scale(1, 1.03); }
    to   { transform: translateX(14px) scale(1.03, 1); }
  }

  .bubble .prize {
    font-size: clamp(2.4rem, 9vmin, 4rem);
    filter: brightness(0);
    opacity: 0.32;
    line-height: 1;
  }

  .bubble.popping { pointer-events: none; animation-play-state: paused; }
  .bubble.popping .film { animation: bubblePop 0.3s ease forwards; }
  .bubble.popping .prize { visibility: hidden; }

  @keyframes bubblePop {
    0%   { transform: scale(1); opacity: 1; }
    45%  { transform: scale(1.25); opacity: 0.9; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .droplet {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(190, 230, 255, 0.9);
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
    pointer-events: none;
    z-index: 11;
    animation: dropletFly 0.6s ease-out forwards;
  }

  @keyframes dropletFly {
    from { transform: rotate(var(--ang)) translateY(0) scale(1); opacity: 1; }
    to   { transform: rotate(var(--ang)) translateY(-70px) scale(0.3); opacity: 0; }
  }

  #hint {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: bold;
    color: var(--ink);
    background: var(--surface-soft);
    padding: 8px 22px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 8;
  }
</style>
</head>
<body>

<div id="pond"></div>
<div id="hint">🫧 Pop a bubble — what's hiding inside?</div>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  const SURPRISES = [
    ['🚀', 'A rocket'], ['🦄', 'A unicorn'], ['🐥', 'A little chick'], ['🌈', 'A rainbow'],
    ['🍦', 'Ice cream'], ['🐬', 'A dolphin'], ['⭐', 'A star'], ['🐸', 'A frog'],
    ['🎁', 'A present'], ['🦋', 'A butterfly'], ['🐢', 'A turtle'], ['🍓', 'A strawberry'],
    ['🚂', 'A train'], ['🐙', 'An octopus'], ['🌻', 'A sunflower'], ['🧸', 'A teddy bear'],
    ['🦁', 'A lion'], ['🍭', 'A lollipop'], ['⚽', 'A ball'], ['👑', 'A crown']
  ];

  const MAX_BUBBLES = 7;
  const pond = document.getElementById('pond');

  LP.initPage({ counterEmoji: '🫧', milestone: 10 });
  LP.speak('Pop the bubbles, ' + LP.playerName + '! What is hiding inside?');

  function spawnBubble() {
    if (pond.querySelectorAll('.bubble:not(.popping)').length >= MAX_BUBBLES) return;
    const prize = LP.pick(SURPRISES);
    const b = document.createElement('div');
    b.className = 'bubble';
    b.dataset.emoji = prize[0];
    b.dataset.word = prize[1];
    b.style.setProperty('--dur', LP.rand(9, 16) + 's');
    b.style.setProperty('--wob', LP.rand(1.8, 3) + 's');
    b.style.left = LP.rand(2, 82) + 'vw';
    b.style.top = '100vh';

    const film = document.createElement('div');
    film.className = 'film';
    const p = document.createElement('span');
    p.className = 'prize';
    p.textContent = prize[0];
    film.appendChild(p);
    b.appendChild(film);

    b.addEventListener('pointerdown', function () { pop(b); });
    b.addEventListener('animationend', function (e) {
      if (e.target === b) b.remove();
    });

    pond.appendChild(b);
  }

  function pop(b) {
    if (b.classList.contains('popping')) return;
    b.classList.add('popping');
    const rect = b.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < 8; i++) {
      const d = document.createElement('div');
      d.className = 'droplet';
      d.style.left = cx + 'px';
      d.style.top = cy + 'px';
      d.style.setProperty('--ang', (i * 45 + LP.rand(-10, 10)) + 'deg');
      d.addEventListener('animationend', function () { d.remove(); });
      pond.appendChild(d);
    }

    // the reveal: the hidden emoji flies free, big and bright
    LP.spawnFly(b.dataset.emoji, cx, cy, 5.5);
    LP.showWordLabel(b.dataset.word + '!');
    LP.speak(b.dataset.word + '!');

    setTimeout(function () { b.remove(); }, 320);
    LP.bumpCounter();
  }

  // any key pops a random bubble
  document.addEventListener('keydown', function (e) {
    const key = LP.guardKey(e);
    if (key === null) return;
    const bubbles = pond.querySelectorAll('.bubble:not(.popping)');
    if (bubbles.length) pop(LP.pick(Array.from(bubbles)));
  });

  for (let i = 0; i < 4; i++) setTimeout(spawnBubble, i * 600);
  setInterval(spawnBubble, 1400);
})();
</script>
</body>
</html>
