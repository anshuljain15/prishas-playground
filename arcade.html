<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Arcade 🕹️ — Grown-Ups' Games at Prisha's Playground</title>
<meta name="description" content="Quick, free arcade games for grown-ups: cricket batting and more. No ads, no tracking, nothing to install.">
<meta name="theme-color" content="#0a0a14">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕹️</text></svg>">
<script>
(function () { 'use strict';
  /* arcade defaults to dark; only an explicit light choice overrides it */
  if (localStorage.getItem('lp_theme') !== 'light')
    document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  html, body {
    height: auto;
    min-height: 100vh;
    min-height: 100svh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
  }

  html[data-theme="dark"] body {
    background: linear-gradient(160deg, hsl(240, 30%, 7%), hsl(280, 35%, 12%));
  }

  #arcade {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 26px 16px 40px;
    font-family: Consolas, "Segoe UI", monospace;
  }

  #arcadeHeader {
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap; justify-content: center;
  }

  #arcade h1 {
    font-size: clamp(1.8rem, 6.5vw, 3.4rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-strong);
  }
  html[data-theme="dark"] #arcade h1 {
    color: hsl(160, 100%, 62%);
    text-shadow: 0 0 14px hsla(160, 100%, 55%, 0.65), 0 0 40px hsla(160, 100%, 55%, 0.3);
  }

  #arcadeHeader button {
    font-size: 1.3rem;
    width: 46px; height: 46px;
    border-radius: 50%;
    cursor: pointer;
    background: var(--surface-soft);
    border: 2px solid hsl(160, 60%, 45%);
    display: flex; align-items: center; justify-content: center;
  }

  .tagline {
    color: var(--ink);
    opacity: 0.75;
    letter-spacing: 2px;
    font-size: clamp(0.85rem, 2.6vw, 1rem);
    text-transform: uppercase;
    text-align: center;
  }

  #cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 280px));
    gap: 20px;
    justify-content: center;
    width: min(920px, 96vw);
    margin-top: 8px;
  }

  .card {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    padding: 26px 18px 22px;
    border-radius: 16px;
    text-decoration: none;
    text-align: center;
    background: var(--card-bg);
    border: 2px solid hsl(160, 80%, 40%);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  html[data-theme="dark"] .card {
    background: hsla(250, 35%, 12%, 0.92);
    box-shadow: 0 0 12px hsla(160, 100%, 55%, 0.12), inset 0 0 24px hsla(160, 100%, 55%, 0.04);
  }
  .card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 22px hsla(160, 100%, 55%, 0.4);
  }

  .card .icon { font-size: 3.2rem; line-height: 1; }
  .card .name {
    font-size: 1.25rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-strong);
  }
  html[data-theme="dark"] .card .name { color: hsl(160, 100%, 68%); }
  .card .sub {
    font-size: 0.9rem;
    color: var(--ink);
    opacity: 0.85;
    letter-spacing: 1px;
  }
  .card .best {
    margin-top: 6px;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: hsl(45, 100%, 60%);
    text-shadow: 0 0 8px hsla(45, 100%, 55%, 0.5);
  }

  .card.soon {
    opacity: 0.45;
    border-style: dashed;
    cursor: default;
    pointer-events: none;
  }
  .card.soon .badge {
    margin-top: 6px;
    font-size: 0.75rem;
    letter-spacing: 3px;
    padding: 3px 12px;
    border-radius: 999px;
    border: 1px solid currentColor;
    color: hsl(300, 90%, 70%);
  }

  #siteFooter nav a { font-family: Consolas, "Segoe UI", monospace; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="arcade">
  <div id="arcadeHeader">
    <h1>🕹️ The Arcade</h1>
    <button id="arcThemeBtn" type="button" aria-label="Day or night mode">🌙</button>
    <button id="arcSoundBtn" type="button" aria-label="Sound on or off">🔊</button>
  </div>

  <p class="tagline">Grown-ups' corner · Quick games, big bragging rights</p>

  <div id="cards">
    <a class="card" href="cricket.html">
      <span class="icon">🏏</span>
      <span class="name">Cricket Blitz</span>
      <span class="sub">Timing. Placement. Sixes.</span>
      <span class="best" id="cricketBest"></span>
    </a>
    <div class="card soon">
      <span class="icon">🧱</span>
      <span class="name">Brick Storm</span>
      <span class="sub">Paddle. Ball. Power-ups.</span>
      <span class="badge">COMING SOON</span>
    </div>
  </div>

  <footer id="siteFooter">
    <nav aria-label="Site links">
      <a href="index.html">🎪 Kids' Playground</a>
      <a href="about.html">💛 About Us</a>
    </nav>
    <p class="fineprint">No ads · No tracking · Nothing to install · Free forever</p>
  </footer>
</div>

<script>
(function () {
  'use strict';

  const soundBtn = document.getElementById('arcSoundBtn');
  let soundOn = localStorage.getItem('lp_sound') !== 'off';
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  soundBtn.addEventListener('click', function () {
    soundOn = !soundOn;
    localStorage.setItem('lp_sound', soundOn ? 'on' : 'off');
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
  });

  const themeBtn = document.getElementById('arcThemeBtn');
  function paintThemeBtn() {
    themeBtn.textContent =
      document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙';
  }
  paintThemeBtn();
  themeBtn.addEventListener('click', function () {
    const dark = document.documentElement.dataset.theme === 'dark';
    if (dark) delete document.documentElement.dataset.theme;
    else document.documentElement.dataset.theme = 'dark';
    localStorage.setItem('lp_theme', dark ? 'light' : 'dark');
    paintThemeBtn();
  });

  const hs = parseInt(localStorage.getItem('lp_cricket_hs') || '0', 10);
  if (hs > 0) document.getElementById('cricketBest').textContent = 'BEST: ' + hs;
})();
</script>
</body>
</html>
