<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed the Monster 👾 · Prisha's Playground</title>
<meta name="description" content="Tap yummy food and feed the friendly monster — a free toddler game from Prisha's Playground.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function () { 'use strict';
  let t = localStorage.getItem('lp_theme');
  if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  if (t === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  #den { position: fixed; inset: 0; overflow: hidden; }

  /* ---------- the monster (pure CSS) ---------- */
  #monster {
    position: fixed;
    left: 50%; top: 52%;
    width: clamp(180px, 38vmin, 300px);
    height: clamp(180px, 38vmin, 300px);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    transition: transform 0.25s ease;
  }

  #monster .body {
    position: absolute; inset: 0;
    border-radius: 46% 54% 50% 50% / 52% 52% 48% 48%;
    background: radial-gradient(circle at 32% 26%, hsl(268, 75%, 66%), hsl(268, 70%, 48%) 65%, hsl(268, 70%, 40%));
    box-shadow: inset -12px -16px 30px rgba(0,0,0,0.18);
    animation: breathe 2.6s ease-in-out infinite alternate;
  }

  @keyframes breathe {
    from { transform: scale(1) rotate(-1.5deg); }
    to   { transform: scale(1.04) rotate(1.5deg); }
  }

  .eye {
    position: absolute;
    top: 24%;
    width: 22%; height: 22%;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .eye.l { left: 22%; }
  .eye.r { right: 22%; }

  .eye::after {
    content: '';
    position: absolute;
    left: 50%; top: 55%;
    width: 45%; height: 45%;
    transform: translate(-50%, -50%);
    background: hsl(270, 60%, 15%);
    border-radius: 50%;
    animation: lookAround 5s ease-in-out infinite;
  }

  @keyframes lookAround {
    0%, 100% { transform: translate(-50%, -50%); }
    25% { transform: translate(-80%, -50%); }
    55% { transform: translate(-20%, -60%); }
    80% { transform: translate(-50%, -35%); }
  }

  #mouth {
    position: absolute;
    left: 50%; top: 60%;
    width: 46%; height: 22%;
    transform: translateX(-50%);
    background: hsl(345, 80%, 30%);
    border-radius: 12% 12% 50% 50% / 20% 20% 80% 80%;
    overflow: hidden;
    transition: height 0.15s ease;
  }

  #mouth::after { /* tongue */
    content: '';
    position: absolute;
    left: 50%; bottom: -30%;
    width: 60%; height: 60%;
    transform: translateX(-50%);
    background: hsl(350, 90%, 62%);
    border-radius: 50% 50% 0 0;
  }

  #monster.chomp #mouth { animation: chomp 0.5s ease; }
  #monster.chomp .body  { animation: gulp 0.5s ease; }

  @keyframes chomp {
    0%   { height: 22%; }
    30%  { height: 34%; }
    60%  { height: 8%; }
    100% { height: 22%; }
  }

  @keyframes gulp {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.1, 0.94); }
    70%  { transform: scale(0.96, 1.06); }
    100% { transform: scale(1); }
  }

  /* ---------- drifting food ---------- */
  .food {
    position: fixed;
    font-size: clamp(3rem, 9vmin, 4.6rem);
    cursor: pointer;
    z-index: 10;
    animation: drift var(--dur) linear forwards;
    line-height: 1;
    will-change: transform;
  }

  @keyframes drift {
    from { transform: translateX(var(--fromX)) rotate(-8deg); }
    to   { transform: translateX(var(--toX)) rotate(8deg); }
  }

  .food .bob { display: inline-block; animation: foodBob 1.1s ease-in-out infinite alternate; }

  @keyframes foodBob {
    from { transform: translateY(-8px); }
    to   { transform: translateY(8px); }
  }

  .food.eaten {
    animation: none;
    transition: left 0.4s ease-in, top 0.4s ease-in, transform 0.4s ease-in, opacity 0.4s;
    transform: scale(0.25) !important;
    opacity: 0.4;
    pointer-events: none;
    z-index: 4; /* dips behind the monster's face as it goes in */
  }

  #hint {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: bold;
    color: var(--ink);
    background: var(--surface-soft);
    padding: 8px 22px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 8;
  }
</style>
</head>
<body>

<div id="den">
  <div id="monster" aria-hidden="true">
    <div class="body"></div>
    <div class="eye l"></div>
    <div class="eye r"></div>
    <div id="mouth"></div>
  </div>
</div>
<div id="hint">🍌 Tap the food to feed Momo!</div>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  const FOODS = [
    ['🍎', 'Apple'], ['🍌', 'Banana'], ['🍕', 'Pizza'], ['🥕', 'Carrot'],
    ['🍪', 'Cookie'], ['🍇', 'Grapes'], ['🥛', 'Milk'], ['🍉', 'Watermelon'],
    ['🧀', 'Cheese'], ['🍓', 'Strawberry'], ['🥦', 'Broccoli'], ['🍞', 'Bread']
  ];
  const YUMS = ['Yum yum!', 'Mmm, tasty!', 'Nom nom nom!', 'Delicious!', 'More please!'];

  const MAX_FOOD = 6;
  const den = document.getElementById('den');
  const monster = document.getElementById('monster');

  LP.initPage({ counterEmoji: '🍽️', milestone: 10 });
  LP.speak('Momo is hungry, ' + LP.playerName + '! Tap the food!');

  function spawnFood() {
    if (den.querySelectorAll('.food:not(.eaten)').length >= MAX_FOOD) return;
    const f = LP.pick(FOODS);
    const el = document.createElement('div');
    el.className = 'food';
    el.dataset.name = f[1];
    el.style.setProperty('--dur', LP.rand(9, 16) + 's');
    // keep lanes clear of the monster's face: top band or bottom band
    el.style.top = (Math.random() < 0.5 ? LP.rand(12, 30) : LP.rand(74, 84)) + 'vh';

    const goingRight = Math.random() < 0.5;
    const off = 160;
    if (goingRight) {
      el.style.setProperty('--fromX', -off + 'px');
      el.style.setProperty('--toX', 'calc(100vw + ' + off + 'px)');
    } else {
      el.style.setProperty('--fromX', 'calc(100vw + ' + off + 'px)');
      el.style.setProperty('--toX', -off + 'px');
    }

    const bob = document.createElement('span');
    bob.className = 'bob';
    bob.textContent = f[0];
    el.appendChild(bob);

    el.addEventListener('pointerdown', function () { feed(el); });
    el.addEventListener('animationend', function (e) {
      if (e.target === el) { el.remove(); spawnFood(); }
    });

    den.appendChild(el);
  }

  function feed(el) {
    if (el.classList.contains('eaten')) return;

    // freeze at current position, then fly into the mouth
    const rect = el.getBoundingClientRect();
    el.style.animation = 'none';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    el.style.setProperty('--fromX', '0px');

    const m = document.getElementById('mouth').getBoundingClientRect();
    requestAnimationFrame(function () {
      el.classList.add('eaten');
      el.style.left = (m.left + m.width / 2 - rect.width / 2) + 'px';
      el.style.top = (m.top + m.height / 2 - rect.height / 2) + 'px';
    });

    setTimeout(function () {
      el.remove();
      monster.classList.remove('chomp');
      // restart the chomp animation reliably
      requestAnimationFrame(function () { monster.classList.add('chomp'); });
      const mm = document.getElementById('mouth').getBoundingClientRect();
      LP.burstAt(mm.left + mm.width / 2, mm.top, ['✨', '💫']);
      setTimeout(function () { monster.classList.remove('chomp'); }, 550);
    }, 380);

    LP.speak(el.dataset.name + '! ' + LP.pick(YUMS));
    LP.bumpCounter();
    setTimeout(spawnFood, 800);
  }

  // any key feeds a random food
  document.addEventListener('keydown', function (e) {
    const key = LP.guardKey(e);
    if (key === null) return;
    const foods = den.querySelectorAll('.food:not(.eaten)');
    if (foods.length) feed(LP.pick(Array.from(foods)));
  });

  for (let i = 0; i < 4; i++) setTimeout(spawnFood, i * 400);
  setInterval(spawnFood, 2500);
})();
</script>
</body>
</html>
