<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Letter Pops 🔤 · Prisha's Playground</title>
<meta name="description" content="Press any key and watch letters burst into emojis — a free toddler alphabet game from Prisha's Playground.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function () { 'use strict';
  let t = localStorage.getItem('lp_theme');
  if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  if (t === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  /* On-screen keyboard — only for touch devices (phones/tablets) */
  #osk {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
    background: var(--surface);
    backdrop-filter: blur(8px);
    box-shadow: 0 -4px 14px rgba(0,0,0,0.12);
    z-index: 46;
  }

  #osk .row { display: grid; gap: 6px; }
  #osk .letters { grid-template-columns: repeat(7, 1fr); }
  #osk .numbers { grid-template-columns: repeat(11, 1fr); }

  #osk button {
    font-family: inherit;
    font-weight: bold;
    font-size: clamp(1.1rem, 5.5vw, 1.8rem);
    padding: 0;
    aspect-ratio: 1 / 1;
    max-height: 54px;
    border: none;
    border-radius: 12px;
    color: white;
    background: hsl(var(--kh, 210), 75%, 42%);
    box-shadow: 0 3px 0 hsl(var(--kh, 210), 75%, 26%);
    cursor: pointer;
    touch-action: manipulation;
  }

  #osk button:active { transform: translateY(2px); box-shadow: 0 1px 0 hsl(var(--kh, 210), 75%, 26%); }
  #osk .numbers button { font-size: clamp(0.95rem, 4vw, 1.4rem); border-radius: 10px; }

  @media (hover: none) and (pointer: coarse) {
    #osk { display: flex; }
    /* lift the word bubble above the keyboard */
    .word-label { top: 48%; }
    .big-letter { top: 30%; }
  }
</style>
</head>
<body>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  const LETTERS = {
    A: [['✈️','Aeroplane'],['🍎','Apple'],['🐜','Ant'],['🥑','Avocado'],['🐊','Alligator']],
    B: [['🍌','Banana'],['🐻','Bear'],['🎈','Balloon'],['🦋','Butterfly'],['⚽','Ball']],
    C: [['🐱','Cat'],['🚗','Car'],['🎂','Cake'],['🐮','Cow'],['🥕','Carrot']],
    D: [['🐶','Dog'],['🦆','Duck'],['🦕','Dinosaur'],['🥁','Drum'],['🍩','Donut']],
    E: [['🐘','Elephant'],['🥚','Egg'],['🦅','Eagle'],['👂','Ear'],['🌍','Earth']],
    F: [['🐸','Frog'],['🐟','Fish'],['🌸','Flower'],['🦊','Fox'],['🔥','Fire']],
    G: [['🍇','Grapes'],['🦒','Giraffe'],['🎸','Guitar'],['🐐','Goat'],['🎁','Gift']],
    H: [['🏠','House'],['🐴','Horse'],['🎩','Hat'],['❤️','Heart'],['🚁','Helicopter']],
    I: [['🍦','Ice cream'],['🏝️','Island'],['🧊','Ice'],['🦎','Iguana'],['🪪','ID card']],
    J: [['🤹','Juggler'],['🧃','Juice'],['✨','Jewel'],['🃏','Joker'],['🪼','Jellyfish']],
    K: [['🪁','Kite'],['🔑','Key'],['🐨','Koala'],['👑','King'],['🦘','Kangaroo']],
    L: [['🦁','Lion'],['🍋','Lemon'],['🍃','Leaf'],['💡','Light'],['🐆','Leopard']],
    M: [['🐵','Monkey'],['🌙','Moon'],['🥛','Milk'],['🍄','Mushroom'],['🐭','Mouse']],
    N: [['🥜','Nut'],['📰','Newspaper'],['🌃','Night'],['👃','Nose'],['🪺','Nest']],
    O: [['🐙','Octopus'],['🍊','Orange'],['🦉','Owl'],['🌊','Ocean'],['🫒','Olive']],
    P: [['🐼','Panda'],['🍕','Pizza'],['🐧','Penguin'],['🥞','Pancake'],['🦜','Parrot']],
    Q: [['👸','Queen'],['❓','Question'],['🪶','Quill'],['🦆','Quack'],['🧵','Quilt']],
    R: [['🌈','Rainbow'],['🚀','Rocket'],['🐰','Rabbit'],['🌹','Rose'],['🤖','Robot']],
    S: [['☀️','Sun'],['⭐','Star'],['🐍','Snake'],['🍓','Strawberry'],['🧦','Socks']],
    T: [['🐯','Tiger'],['🚂','Train'],['🌳','Tree'],['🐢','Turtle'],['🍅','Tomato']],
    U: [['☂️','Umbrella'],['🦄','Unicorn'],['🛸','UFO'],['⬆️','Up'],['🌌','Universe']],
    V: [['🌋','Volcano'],['🎻','Violin'],['🚐','Van'],['🧛','Vampire'],['🥦','Vegetable']],
    W: [['🐋','Whale'],['🍉','Watermelon'],['🐺','Wolf'],['⌚','Watch'],['🌊','Wave']],
    X: [['🎄','Xmas tree'],['🩻','X-ray'],['🎹','Xylophone'],['❌','X mark'],['🛶','Xebec']],
    Y: [['💛','Yellow heart'],['🧶','Yarn'],['🥱','Yawn'],['🪀','Yo-yo'],['🍠','Yam']],
    Z: [['🦓','Zebra'],['🤐','Zipper'],['⚡','Zap'],['0️⃣','Zero'],['💤','Zzz']]
  };

  const NUMBER_EMOJIS = ['🎈','⭐','🍎','🐤','🌸','🍪','🐠','🦋','🍓','🎀'];
  const NUMBER_WORDS = ['Zero','One','Two','Three','Four','Five','Six','Seven','Eight','Nine'];

  LP.initPage({ counterEmoji: '🎯', milestone: 25 });
  LP.speak('Press any key, ' + LP.playerName + '!');

  function handleLetter(letter) {
    const entries = LETTERS[letter];
    const featured = LP.pick(entries);
    LP.showBigLetter(letter);
    LP.showWordLabel(featured[1]);
    const spot = LP.randomSpot();
    const others = entries.filter(function (en) { return en !== featured; });
    LP.burstAt(spot.x, spot.y,
      [featured[0]].concat(others.map(function (en) { return en[0]; })), true);
    LP.speak(letter + '! ' + featured[1] + '!');
  }

  function handleNumber(n) {
    LP.showBigLetter(String(n));
    LP.showWordLabel(NUMBER_WORDS[n]);
    LP.speak(NUMBER_WORDS[n] + '!');
    if (n === 0) {
      LP.partyBurst(1);
      return;
    }
    const emoji = NUMBER_EMOJIS[n];
    for (let i = 0; i < n; i++) {
      setTimeout(function () {
        LP.spawnFly(emoji,
          LP.rand(innerWidth * 0.1, innerWidth * 0.9),
          LP.rand(innerHeight * 0.25, innerHeight * 0.8),
          LP.rand(3.5, 5));
      }, i * 120);
    }
  }

  function press(key) {
    const upper = key.length === 1 ? key.toUpperCase() : '';
    if (upper >= 'A' && upper <= 'Z') {
      handleLetter(upper);
    } else if (key >= '0' && key <= '9') {
      handleNumber(Number.parseInt(key, 10));
    } else if (key === ' ') {
      LP.partyBurst(3);
      LP.speak('Party!');
    } else {
      const spot = LP.randomSpot();
      LP.spawnFly(LP.pick(LP.PARTY), spot.x, spot.y);
    }
    LP.bumpCounter();
  }

  document.addEventListener('keydown', function (e) {
    const key = LP.guardKey(e);
    if (key !== null) press(key);
  });

  /* On-screen keyboard for touch devices (shown via CSS media query) */
  const osk = document.createElement('div');
  osk.id = 'osk';
  osk.setAttribute('aria-label', 'Letter keyboard');

  function keyButton(label, key, hue) {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.style.setProperty('--kh', hue);
    b.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      press(key);
    });
    return b;
  }

  const lettersRow = document.createElement('div');
  lettersRow.className = 'row letters';
  for (let i = 0; i < 26; i++) {
    const ch = String.fromCharCode(65 + i);
    lettersRow.appendChild(keyButton(ch, ch, Math.round(i / 26 * 330)));
  }

  const numbersRow = document.createElement('div');
  numbersRow.className = 'row numbers';
  for (let n = 0; n <= 9; n++) {
    numbersRow.appendChild(keyButton(String(n), String(n), 200));
  }
  numbersRow.appendChild(keyButton('🎉', ' ', 330));

  osk.appendChild(lettersRow);
  osk.appendChild(numbersRow);
  document.body.appendChild(osk);
})();
</script>
</body>
</html>
