<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musical Keys 🎹 · Prisha's Playground</title>
<meta name="description" content="Every key plays a happy note — a free toddler music game from Prisha's Playground.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function () { 'use strict';
  let t = localStorage.getItem('lp_theme');
  if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  if (t === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
<link rel="stylesheet" href="shared.css">
<style>
  #stage { position: fixed; inset: 0; overflow: hidden; cursor: pointer; }

  .bar {
    position: fixed;
    bottom: 0;
    width: clamp(40px, 7vw, 90px);
    border-radius: 20px 20px 0 0;
    background: linear-gradient(to top, hsl(var(--nh), 85%, 55%), hsl(var(--nh), 90%, 70%));
    box-shadow: 0 0 24px hsla(var(--nh), 90%, 60%, 0.6);
    animation: barRise 0.9s ease-out forwards;
    pointer-events: none;
    z-index: 10;
    transform-origin: bottom;
  }

  @keyframes barRise {
    0%   { transform: scaleY(0); opacity: 1; }
    25%  { transform: scaleY(1.05); opacity: 1; }
    35%  { transform: scaleY(1); }
    70%  { opacity: 0.9; }
    100% { transform: scaleY(1); opacity: 0; }
  }

  .bar .tag {
    position: absolute;
    top: -64px; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: bold;
    color: white;
    background: hsl(var(--nh), 80%, 45%);
    border-radius: 50%;
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    animation: tagBounce 0.9s ease-out forwards;
  }

  @keyframes tagBounce {
    0%   { transform: translateX(-50%) scale(0); }
    30%  { transform: translateX(-50%) scale(1.3); }
    50%  { transform: translateX(-50%) scale(1); }
    100% { transform: translateX(-50%) scale(1); opacity: 0; }
  }

  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 6px solid hsla(var(--nh), 85%, 55%, 0.8);
    pointer-events: none;
    z-index: 9;
    animation: rippleOut 0.7s ease-out forwards;
  }

  @keyframes rippleOut {
    from { width: 20px; height: 20px; opacity: 1; margin: -10px; }
    to   { width: 240px; height: 240px; opacity: 0; margin: -120px; }
  }

  #hint {
    position: fixed;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: bold;
    color: var(--ink);
    background: var(--surface-soft);
    padding: 8px 22px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 8;
  }
</style>
</head>
<body>

<div id="stage"></div>
<div id="hint">🎹 Press any key or tap anywhere!</div>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  LP.initPage({ counterEmoji: '🎵', milestone: 25 });
  LP.speak('Make some music, ' + LP.playerName + '!');

  const stage = document.getElementById('stage');

  /* ---------- Sound: pentatonic scale, always sounds happy ---------- */
  const BASE = 130.81; // C3
  const PENTA = [0, 2, 4, 7, 9];
  let ctx = null;

  function audio() {
    if (!ctx) {
      const AC = globalThis.AudioContext || globalThis.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function noteFreq(idx) {
    const octave = Math.floor(idx / 5);
    const semi = PENTA[idx % 5];
    return BASE * Math.pow(2, octave + semi / 12);
  }

  function playNote(idx, when, dur) {
    if (!LP.isSoundOn()) return;
    const ac = audio();
    if (!ac) return;
    const t = ac.currentTime + (when || 0);
    dur = dur || 0.7;
    const freq = noteFreq(idx);

    const osc = ac.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const shimmer = ac.createOscillator();
    shimmer.type = 'sine';
    shimmer.frequency.value = freq * 2;

    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.06, t + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.6);

    osc.connect(g); g.connect(ac.destination);
    shimmer.connect(g2); g2.connect(ac.destination);
    osc.start(t); osc.stop(t + dur);
    shimmer.start(t); shimmer.stop(t + dur);
  }

  function playKick() {
    if (!LP.isSoundOn()) return;
    const ac = audio();
    if (!ac) return;
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(45, t + 0.25);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.3);
  }

  function playHat() {
    if (!LP.isSoundOn()) return;
    const ac = audio();
    if (!ac) return;
    const t = ac.currentTime;
    const len = 0.12;
    const buf = ac.createBuffer(1, ac.sampleRate * len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const hp = ac.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 6000;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + len);
    src.connect(hp); hp.connect(g); g.connect(ac.destination);
    src.start(t);
  }

  /* ---------- Visuals ---------- */
  function showBar(idx, label, xFrac) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const hue = Math.round(idx / 18 * 300);
    bar.style.setProperty('--nh', hue);
    bar.style.left = 'calc(' + (xFrac * 100) + 'vw - 3vw)';
    bar.style.height = (22 + idx * 3.2) + 'vh';
    if (label) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = label;
      bar.appendChild(tag);
    }
    bar.addEventListener('animationend', function (e) {
      if (e.target === bar) bar.remove();
    });
    stage.appendChild(bar);
    if (Math.random() < 0.3) {
      LP.spawnFly(LP.pick(['🎵', '🎶', '⭐', '✨']),
        xFrac * innerWidth, innerHeight * 0.5, 2.5);
    }
  }

  function showRipple(x, y, idx) {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    r.style.setProperty('--nh', Math.round(idx / 18 * 300));
    r.addEventListener('animationend', function () { r.remove(); });
    stage.appendChild(r);
  }

  /* ---------- Key → note mapping (rows low → high, left → right) ---------- */
  const ROWS = ['zxcvbnm', 'asdfghjkl', 'qwertyuiop'];

  function keyToNote(ch) {
    for (let r = 0; r < ROWS.length; r++) {
      const pos = ROWS[r].indexOf(ch);
      if (pos !== -1) {
        return {
          idx: r * 5 + Math.floor(pos * 8 / ROWS[r].length),
          xFrac: (pos + 0.5) / ROWS[r].length
        };
      }
    }
    return null;
  }

  document.addEventListener('keydown', function (e) {
    const key = LP.guardKey(e);
    if (key === null) return;

    const lower = key.length === 1 ? key.toLowerCase() : '';
    const mapped = lower ? keyToNote(lower) : null;

    if (mapped) {
      playNote(mapped.idx);
      showBar(mapped.idx, key.toUpperCase(), mapped.xFrac);
    } else if (key >= '0' && key <= '9') {
      const n = Number.parseInt(key, 10);
      if (n % 2 === 1) playKick(); else playHat();
      showBar(n, key, (n + 0.5) / 10);
    } else if (key === ' ') {
      // happy chord
      playNote(5, 0); playNote(7, 0.06); playNote(10, 0.12);
      LP.partyBurst(1);
    } else {
      const idx = Math.floor(LP.rand(0, 18));
      playNote(idx);
      showBar(idx, '♪', LP.rand(0.1, 0.9));
    }
    LP.bumpCounter();
  });

  // Tap anywhere plays a note by horizontal position
  stage.addEventListener('pointerdown', function (e) {
    const xFrac = e.clientX / innerWidth;
    const idx = Math.min(17, Math.floor(xFrac * 18));
    playNote(idx);
    showBar(idx, '♪', xFrac);
    showRipple(e.clientX, e.clientY, idx);
    LP.bumpCounter();
  });
})();
</script>
</body>
</html>
